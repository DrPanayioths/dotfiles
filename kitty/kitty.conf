# Font
font_family      JetBrainsMono Nerd Font Mono
font_size        12.0

# Shell
shell /bin/zsh

# Transparency & blur
background_opacity 0.85

# Padding
window_padding_width 12

# Colors (Tokyo Night theme)
foreground #a9b1d6
background #1a1b26
cursor     #c0caf5

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# No border
hide_window_decorations yes

# Cursor
cursor_shape beam
cursor_blink_interval 0.5
